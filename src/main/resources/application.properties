spring.application.name=back

# ?? BASE DE DATOS ????????????????????????????????????????????????????????????
# En local usa tu PostgreSQL. En Koyeb configura estas como variables de entorno.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/semana_academica}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / HIBERNATE ??????????????????????????????????????????????????????????
# validate: Hibernate verifica que las entidades coincidan con la BD pero NO modifica nada.
# Usamos validate porque la BD ya fue creada con el script SQL.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? SERVIDOR ?????????????????????????????????????????????????????????????????
server.address=0.0.0.0
server.port=8081

# Permite solicitudes desde cualquier origen en tu red
spring.web.cors.allowed-origins=http://10.36.9.83/:5173,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ?? JWT ??????????????????????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET:semana_academica_secret_key_muy_larga_y_segura_2026}
jwt.expiration=86400000

# ?? OPEN-IN-VIEW (desactivar warning) ????????????????????????????????????????
spring.jpa.open-in-view=false

# ?? SERIALIZACI”N DE FECHAS ??????????????????????????????????????????????????
# Serializa LocalDate como "2026-12-01" y LocalTime como "08:00:00"
spring.jackson.serialization.write-dates-as-timestamps=false

# Ruta donde se guardar·n las im·genes en local
#app.uploads.dir=${UPLOADS_DIR:uploads}
# URL base para acceder a las im·genes
#app.uploads.url=${UPLOADS_URL:http://localhost:8080/uploads}

app.uploads.dir=uploads
app.uploads.url=http://localhost:8081/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ConfiguraciÛn SMTP (ejemplo con Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URL del frontend para el link del correo
app.frontend.url=http://localhost:5173